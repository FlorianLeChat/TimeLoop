stages:
    - lint
    - build
    - analyze
    - deploy

default:
    cache:
        key:
            files:
                - package-lock.json
        paths:
            - .npm
        policy: pull-push

lint:eslint:
    stage: lint
    image: node:22-alpine
    before_script:
        - npm ci --cache .npm --prefer-offline
    script:
        - npm run lint
    artifacts:
        when: always
        reports:
            codequality: gl-codequality.json
        expire_in: 1 hour

build:node:
    stage: build
    image: node:22-alpine
    before_script:
        - npm ci --cache .npm --prefer-offline
    script:
        - npm run build
    artifacts:
        paths:
            - dist/
        expire_in: 1 hour
    dependencies: []

analyze:sast:
    stage: analyze
    image: $CI_TEMPLATE_REGISTRY_HOST/security-products/semgrep
    script:
        - /analyzer run
    artifacts:
        access: developer
        paths:
            - gl-sast-report.json
        reports:
            sast: gl-sast-report.json
        expire_in: 1 hour
    dependencies: []

analyze:iac:
    stage: analyze
    image: $CI_TEMPLATE_REGISTRY_HOST/security-products/kics
    script:
        - /analyzer run
    artifacts:
        access: developer
        paths:
            - gl-sast-report.json
        reports:
            sast: gl-sast-report.json
        expire_in: 1 hour
    dependencies: []

analyze:secret-detection:
    stage: analyze
    image: $CI_TEMPLATE_REGISTRY_HOST/security-products/secrets
    script:
        - /analyzer run
    artifacts:
        access: developer
        paths:
            - gl-secret-detection-report.json
        reports:
            secret_detection: gl-secret-detection-report.json
        expire_in: 1 hour
    dependencies: []

deploy:pages:
    stage: deploy
    image: alpine:3
    rules:
        - if: $CI_COMMIT_TAG
          when: on_success
        - if: $CI_COMMIT_BRANCH
          when: manual
    pages:
        publish: dist
    before_script: []
    script:
        - echo 'Deploy to GitLab Pages'
    artifacts:
        expire_in: 1 hour
    dependencies:
        - build:node
    allow_failure: false
